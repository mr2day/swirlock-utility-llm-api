<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Utility LLM Test</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1117;
        --panel: #151b23;
        --field: #0f141c;
        --field-soft: #111923;
        --text: #d7dee8;
        --muted: #8b98aa;
        --line: #2a3443;
        --accent: #4c8df6;
        --accent-dark: #3274df;
        --danger: #ff8a80;
        --ok: #7ee2a8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 680;
      }

      .status {
        min-height: 24px;
        color: var(--muted);
        font-size: 14px;
        text-align: right;
      }

      .status.ok {
        color: var(--ok);
      }

      .status.error {
        color: var(--danger);
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      section {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 650;
        text-transform: uppercase;
      }

      textarea,
      input,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--field);
        color: var(--text);
        font: inherit;
      }

      textarea {
        min-height: 220px;
        padding: 12px;
        resize: vertical;
        line-height: 1.45;
      }

      input,
      select {
        height: 38px;
        padding: 0 10px;
      }

      .dropzone {
        display: grid;
        place-items: center;
        min-height: 220px;
        border: 1px dashed #aab5c8;
        border-radius: 8px;
        background: var(--field-soft);
        overflow: hidden;
        position: relative;
      }

      .dropzone.dragging {
        border-color: var(--accent);
        background: #172538;
      }

      .dropzone img {
        display: none;
        width: 100%;
        height: 100%;
        max-height: 340px;
        object-fit: contain;
      }

      .dropzone.has-image img {
        display: block;
      }

      .dropzone.has-image .empty {
        display: none;
      }

      .empty {
        color: var(--muted);
        text-align: center;
        padding: 16px;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-top: 12px;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 16px;
      }

      button {
        border: 1px solid var(--line);
        border-radius: 6px;
        height: 38px;
        padding: 0 14px;
        background: var(--field);
        color: var(--text);
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }

      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
      }

      button.primary:hover {
        background: var(--accent-dark);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.62;
      }

      .answer {
        min-height: 220px;
        white-space: pre-wrap;
        line-height: 1.5;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 12px;
        background: var(--field);
      }

      .meta {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
        overflow-wrap: anywhere;
      }

      @media (max-width: 820px) {
        header {
          align-items: start;
          flex-direction: column;
        }

        .status {
          text-align: left;
        }

        .grid,
        .controls {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Utility LLM Test</h1>
        <div id="status" class="status">Checking model status...</div>
      </header>

      <div class="grid">
        <section>
          <label for="question">Question</label>
          <textarea id="question" placeholder="Ask the model something"></textarea>

          <div class="controls">
            <div>
              <label for="tokens">Max Tokens</label>
              <input id="tokens" type="number" min="1" max="1024" value="512" />
            </div>
            <div>
              <label for="temperature">Temperature</label>
              <input id="temperature" type="number" min="0" max="2" step="0.1" value="0.2" />
            </div>
            <div>
              <label for="format">Format</label>
              <select id="format">
                <option value="text">Text</option>
                <option value="json">JSON</option>
              </select>
            </div>
          </div>
        </section>

        <section>
          <label for="imageFile">Image</label>
          <div id="dropzone" class="dropzone" tabindex="0">
            <div class="empty">Paste, drop, or choose an image</div>
            <img id="preview" alt="Selected image preview" />
          </div>
          <div class="actions">
            <input id="imageFile" type="file" accept="image/*" />
            <button id="clearImage" type="button">Clear</button>
          </div>
        </section>
      </div>

      <section style="margin-top: 16px">
        <label for="answer">Answer</label>
        <div id="answer" class="answer"></div>
        <div id="meta" class="meta"></div>
        <div class="actions">
          <button id="clearAll" type="button">Reset</button>
          <button id="submit" class="primary" type="button">Run</button>
        </div>
      </section>
    </main>

    <script>
      const question = document.getElementById("question");
      const tokens = document.getElementById("tokens");
      const temperature = document.getElementById("temperature");
      const format = document.getElementById("format");
      const dropzone = document.getElementById("dropzone");
      const imageFile = document.getElementById("imageFile");
      const preview = document.getElementById("preview");
      const clearImage = document.getElementById("clearImage");
      const clearAll = document.getElementById("clearAll");
      const submit = document.getElementById("submit");
      const answer = document.getElementById("answer");
      const meta = document.getElementById("meta");
      const status = document.getElementById("status");

      let imageDataUrl = "";
      let imageMimeType = "";

      function correlationId(prefix) {
        const random =
          typeof crypto !== "undefined" && crypto.randomUUID
            ? crypto.randomUUID()
            : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
        return `${prefix}-${random}`;
      }

      function setStatus(message, kind = "") {
        status.textContent = message;
        status.className = `status ${kind}`.trim();
      }

      function setImage(dataUrl, mimeType) {
        imageDataUrl = dataUrl;
        imageMimeType = mimeType;
        preview.src = dataUrl;
        dropzone.classList.add("has-image");
      }

      function resetImage() {
        imageDataUrl = "";
        imageMimeType = "";
        preview.removeAttribute("src");
        imageFile.value = "";
        dropzone.classList.remove("has-image");
      }

      function readImageFile(file) {
        if (!file || !file.type.startsWith("image/")) return;
        const reader = new FileReader();
        reader.onload = () => setImage(String(reader.result), file.type);
        reader.readAsDataURL(file);
      }

      async function refreshStatus() {
        try {
          const response = await fetch("/v2/model/status", {
            headers: { "x-correlation-id": correlationId("browser-status") },
          });
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.error?.message || "Status request failed");
          const ready = payload.data?.ready;
          const loaded = payload.data?.loaded;
          const modelId = payload.data?.modelId || "model";
          setStatus(`${modelId}: ${ready && loaded ? "ready" : "not ready"}`, ready ? "ok" : "error");
        } catch (error) {
          setStatus(error.message || "Status unavailable", "error");
        }
      }

      async function runInference() {
        const text = question.value.trim();
        if (!text && !imageDataUrl) {
          answer.textContent = "";
          meta.textContent = "Provide text, an image, or both.";
          return;
        }

        const parts = [];
        if (text) parts.push({ type: "text", text });
        if (imageDataUrl) {
          parts.push({
            type: "image",
            imageBase64: imageDataUrl,
            mimeType: imageMimeType || "image/png",
          });
        }

        const body = {
          requestContext: {
            callerService: "browser-test",
            priority: "interactive",
            requestedAt: new Date().toISOString(),
          },
          input: { parts },
          options: {
            maxOutputTokens: Number(tokens.value || 512),
            temperature: Number(temperature.value || 0.2),
            responseFormat: format.value,
          },
        };

        submit.disabled = true;
        answer.textContent = "";
        meta.textContent = "Running...";

        try {
          const response = await fetch("/v2/infer", {
            method: "POST",
            headers: {
              "content-type": "application/json",
              "x-correlation-id": correlationId("browser-infer"),
            },
            body: JSON.stringify(body),
          });
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.error?.message || "Inference request failed");

          answer.textContent = payload.data?.output?.text || "";
          meta.textContent = [
            `model: ${payload.data?.modelId || ""}`,
            `finish: ${payload.data?.finishReason || ""}`,
            `request: ${payload.meta?.requestId || ""}`,
          ].join(" | ");
        } catch (error) {
          answer.textContent = "";
          meta.textContent = error.message || "Inference failed";
        } finally {
          submit.disabled = false;
          refreshStatus();
        }
      }

      document.addEventListener("paste", (event) => {
        for (const item of event.clipboardData?.items || []) {
          if (item.type.startsWith("image/")) {
            readImageFile(item.getAsFile());
            event.preventDefault();
            break;
          }
        }
      });

      dropzone.addEventListener("dragover", (event) => {
        event.preventDefault();
        dropzone.classList.add("dragging");
      });

      dropzone.addEventListener("dragleave", () => {
        dropzone.classList.remove("dragging");
      });

      dropzone.addEventListener("drop", (event) => {
        event.preventDefault();
        dropzone.classList.remove("dragging");
        readImageFile(event.dataTransfer?.files?.[0]);
      });

      imageFile.addEventListener("change", () => readImageFile(imageFile.files?.[0]));
      clearImage.addEventListener("click", resetImage);
      clearAll.addEventListener("click", () => {
        question.value = "";
        answer.textContent = "";
        meta.textContent = "";
        resetImage();
      });
      submit.addEventListener("click", runInference);
      question.addEventListener("keydown", (event) => {
        if (event.ctrlKey && event.key === "Enter") runInference();
      });

      refreshStatus();
    </script>
  </body>
</html>
