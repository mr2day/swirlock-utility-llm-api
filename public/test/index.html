<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Swirlock LLM Host Test</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101114;
        --surface: #191b20;
        --surface-2: #20242b;
        --field: #111318;
        --line: #343842;
        --text: #eef1f5;
        --muted: #a0a7b3;
        --subtle: #737b8a;
        --accent: #4fa88a;
        --accent-strong: #68c7a5;
        --danger: #ff8a80;
        --warning: #e5bc63;
        --shadow: rgba(0, 0, 0, 0.32);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      textarea,
      input,
      select {
        font: inherit;
      }

      button {
        border: 0;
        color: inherit;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.52;
      }

      .shell {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 100vh;
        min-height: 100dvh;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        flex-direction: column;
        justify-content: space-between;
        gap: 6px;
        min-height: 58px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        background: rgba(16, 17, 20, 0.92);
        backdrop-filter: blur(12px);
        position: sticky;
        top: 0;
        z-index: 5;
      }

      h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 680;
        letter-spacing: 0;
      }

      .status {
        min-width: 0;
        color: var(--muted);
        font-size: 13px;
        text-align: left;
        overflow-wrap: anywhere;
      }

      .status.ok {
        color: var(--accent-strong);
      }

      .status.error {
        color: var(--danger);
      }

      .messages {
        width: min(920px, calc(100vw - 20px));
        margin: 0 auto;
        padding: 16px 0 22px;
      }

      .empty-state {
        display: grid;
        place-items: center;
        min-height: calc(100dvh - 250px);
        color: var(--muted);
        text-align: center;
      }

      .empty-state strong {
        display: block;
        margin-bottom: 8px;
        color: var(--text);
        font-size: 20px;
        font-weight: 700;
      }

      .message {
        display: grid;
        grid-template-columns: 30px minmax(0, 1fr);
        gap: 9px;
        margin: 0 0 18px;
      }

      .avatar {
        display: grid;
        place-items: center;
        width: 30px;
        height: 30px;
        border-radius: 8px;
        background: var(--surface-2);
        color: var(--muted);
        font-weight: 750;
        font-size: 13px;
        user-select: none;
      }

      .message.user .avatar {
        background: #2a313b;
        color: var(--text);
      }

      .message.assistant .avatar {
        background: #1e3a31;
        color: var(--accent-strong);
      }

      .bubble {
        min-width: 0;
        width: fit-content;
        max-width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid transparent;
        background: transparent;
        line-height: 1.55;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .message.user .bubble {
        justify-self: end;
        background: var(--surface-2);
        border-color: var(--line);
      }

      .message.assistant .bubble {
        width: 100%;
        max-width: 100%;
        padding-left: 0;
        padding-right: 0;
      }

      .text-block {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .thumbnail-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .message .thumbnail-grid {
        margin-bottom: 2px;
      }

      .message-thumb {
        width: 96px;
        height: 72px;
        border-radius: 8px;
        border: 1px solid var(--line);
        object-fit: cover;
        background: var(--field);
      }

      .thinking-panel {
        display: none;
        margin-bottom: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #15181d;
        color: var(--muted);
      }

      .thinking-panel.visible {
        display: block;
      }

      .thinking-panel summary {
        cursor: pointer;
        padding: 9px 12px;
        color: var(--warning);
        font-size: 13px;
        font-weight: 650;
      }

      .thinking-text {
        max-height: 220px;
        overflow: auto;
        border-top: 1px solid var(--line);
        padding: 10px 12px 12px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        font-size: 13px;
        line-height: 1.5;
      }

      .assistant-text {
        min-height: 28px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .message-meta {
        margin-top: 10px;
        color: var(--subtle);
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      .message-meta.error {
        color: var(--danger);
      }

      .composer-wrap {
        position: sticky;
        bottom: 0;
        z-index: 4;
        padding: 10px 8px max(10px, env(safe-area-inset-bottom));
        background: linear-gradient(rgba(16, 17, 20, 0), var(--bg) 22px);
      }

      .composer {
        width: min(920px, calc(100vw - 16px));
        margin: 0 auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 14px 38px var(--shadow);
      }

      .composer.dragging {
        border-color: var(--accent);
      }

      .attachments {
        display: none;
        gap: 8px;
        flex-wrap: wrap;
        padding: 10px 10px 0;
      }

      .attachments.visible {
        display: flex;
      }

      .attachment {
        position: relative;
        width: 86px;
        height: 68px;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid var(--line);
        background: var(--field);
      }

      .attachment img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .remove-attachment {
        position: absolute;
        top: 4px;
        right: 4px;
        display: grid;
        place-items: center;
        width: 22px;
        height: 22px;
        border-radius: 999px;
        background: rgba(7, 9, 12, 0.82);
        color: var(--text);
        font-size: 15px;
        line-height: 1;
      }

      .input-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 6px;
        align-items: end;
        padding: 8px;
      }

      textarea {
        width: 100%;
        min-height: 48px;
        max-height: 170px;
        resize: none;
        border: 0;
        outline: none;
        background: transparent;
        color: var(--text);
        line-height: 1.45;
        padding: 6px 4px;
      }

      textarea::placeholder {
        color: var(--subtle);
      }

      .send {
        display: grid;
        place-items: center;
        width: 40px;
        height: 40px;
        border-radius: 8px;
        background: var(--accent);
        color: #06110d;
        font-size: 18px;
        font-weight: 800;
      }

      .send:hover:not(:disabled) {
        background: var(--accent-strong);
      }

      .settings {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        align-items: center;
        padding: 0 8px 8px;
      }

      .icon-button,
      .stop,
      .clear {
        display: inline-grid;
        place-items: center;
        height: 36px;
        min-width: 36px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--field);
        color: var(--text);
        padding: 0 10px;
        justify-content: center;
      }

      .stop {
        display: none;
        color: var(--warning);
      }

      .stop.visible {
        display: inline-grid;
      }

      .clear {
        color: var(--muted);
      }

      .setting {
        display: grid;
        gap: 4px;
        min-width: 0;
      }

      .setting label,
      .check {
        color: var(--muted);
        font-size: 12px;
      }

      input,
      select {
        width: 100%;
        height: 36px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--field);
        color: var(--text);
        padding: 0 9px;
      }

      .check {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        min-height: 36px;
        padding: 0 4px;
        white-space: nowrap;
      }

      .check input {
        width: 16px;
        height: 16px;
        accent-color: var(--accent);
      }

      .file-input {
        display: none;
      }

      .settings .icon-button,
      .settings .clear,
      .settings .stop,
      .settings .check {
        width: 100%;
      }

      @media (min-width: 760px) {
        .topbar {
          align-items: center;
          flex-direction: row;
          gap: 18px;
          min-height: 56px;
          padding: 12px 18px;
        }

        .status {
          text-align: right;
        }

        .messages {
          width: min(920px, calc(100vw - 28px));
          padding: 24px 0 28px;
        }

        .message {
          grid-template-columns: 36px minmax(0, 1fr);
          gap: 12px;
          margin-bottom: 22px;
        }

        .avatar {
          width: 36px;
          height: 36px;
        }

        .bubble {
          max-width: min(760px, 100%);
          padding: 12px 14px;
        }

        .message-thumb {
          width: 112px;
          height: 82px;
        }

        .composer-wrap {
          padding: 14px;
        }

        .composer {
          width: min(920px, calc(100vw - 28px));
        }

        .input-row {
          gap: 8px;
          padding: 10px;
        }

        textarea {
          min-height: 52px;
          max-height: 210px;
        }

        .send {
          width: 38px;
          height: 38px;
        }

        .settings {
          grid-template-columns:
            auto minmax(88px, 120px) minmax(88px, 130px) minmax(88px, 120px)
            auto auto auto;
          padding: 0 10px 10px;
        }

        .icon-button,
        .stop,
        .clear {
          height: 34px;
          min-width: 34px;
        }

        .settings .icon-button,
        .settings .clear,
        .settings .stop,
        .settings .check {
          width: auto;
        }

        input,
        select {
          height: 34px;
        }

        .check {
          justify-content: flex-start;
          min-height: 34px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <h1>Swirlock LLM Host Test</h1>
        <div id="status" class="status">Checking model status...</div>
      </header>

      <main id="messages" class="messages">
        <div id="emptyState" class="empty-state">
          <div>
            <strong>Swirlock LLM Host</strong>
            <span>What should I inspect?</span>
          </div>
        </div>
      </main>

      <div class="composer-wrap">
        <section id="composer" class="composer" aria-label="Message composer">
          <div id="attachments" class="attachments"></div>
          <div class="input-row">
            <textarea id="prompt" rows="1" placeholder="Message the model"></textarea>
            <button id="send" class="send" type="button" title="Send" aria-label="Send">&gt;</button>
          </div>
          <div class="settings">
            <button id="attach" class="icon-button" type="button" title="Attach image" aria-label="Attach image">
              +
            </button>
            <div class="setting">
              <label for="priority">Priority</label>
              <input id="priority" type="number" step="1" placeholder="lowest" />
            </div>
            <div class="setting">
              <label for="temperature">Temperature</label>
              <input id="temperature" type="number" step="0.1" value="0.2" />
            </div>
            <div class="setting">
              <label for="format">Format</label>
              <select id="format">
                <option value="text">Text</option>
                <option value="json">JSON</option>
              </select>
            </div>
            <label class="check" for="thinking">
              <input id="thinking" type="checkbox" />
              Thinking
            </label>
            <button id="stop" class="stop" type="button">Stop</button>
            <button id="clear" class="clear" type="button">Clear</button>
          </div>
          <input id="file" class="file-input" type="file" accept="image/*" multiple />
        </section>
      </div>
    </div>

    <script>
      const messages = document.getElementById("messages");
      const emptyState = document.getElementById("emptyState");
      const statusEl = document.getElementById("status");
      const composer = document.getElementById("composer");
      const attachmentsEl = document.getElementById("attachments");
      const promptEl = document.getElementById("prompt");
      const sendButton = document.getElementById("send");
      const attachButton = document.getElementById("attach");
      const fileInput = document.getElementById("file");
      const priorityEl = document.getElementById("priority");
      const temperatureEl = document.getElementById("temperature");
      const formatEl = document.getElementById("format");
      const thinkingEl = document.getElementById("thinking");
      const stopButton = document.getElementById("stop");
      const clearButton = document.getElementById("clear");

      const attachments = [];
      let activeSocket = null;
      let activeAssistant = null;
      let thinkingTouched = false;

      function correlationId(prefix) {
        const random =
          typeof crypto !== "undefined" && crypto.randomUUID
            ? crypto.randomUUID()
            : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
        return `${prefix}-${random}`;
      }

      function setStatus(message, kind = "") {
        statusEl.textContent = message;
        statusEl.className = `status ${kind}`.trim();
      }

      function scrollToBottom() {
        requestAnimationFrame(() => {
          window.scrollTo({ top: document.documentElement.scrollHeight, behavior: "smooth" });
        });
      }

      function autosizePrompt() {
        promptEl.style.height = "auto";
        promptEl.style.height = `${Math.min(210, Math.max(52, promptEl.scrollHeight))}px`;
      }

      function fileToDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => {
            resolve({
              id: correlationId("image"),
              dataUrl: String(reader.result),
              mimeType: file.type || "image/png",
              name: file.name || "image",
            });
          };
          reader.onerror = () => reject(new Error("Could not read image."));
          reader.readAsDataURL(file);
        });
      }

      async function addImageFiles(files) {
        const imageFiles = Array.from(files || []).filter((file) => file.type.startsWith("image/"));
        if (imageFiles.length === 0) return;

        const loaded = await Promise.all(imageFiles.map(fileToDataUrl));
        attachments.push(...loaded);
        renderAttachments();
      }

      function renderAttachments() {
        attachmentsEl.textContent = "";
        attachmentsEl.classList.toggle("visible", attachments.length > 0);

        for (const item of attachments) {
          const card = document.createElement("div");
          card.className = "attachment";

          const img = document.createElement("img");
          img.src = item.dataUrl;
          img.alt = item.name;

          const remove = document.createElement("button");
          remove.className = "remove-attachment";
          remove.type = "button";
          remove.title = "Remove image";
          remove.setAttribute("aria-label", "Remove image");
          remove.textContent = "x";
          remove.addEventListener("click", () => {
            const index = attachments.findIndex((candidate) => candidate.id === item.id);
            if (index >= 0) attachments.splice(index, 1);
            renderAttachments();
          });

          card.append(img, remove);
          attachmentsEl.append(card);
        }
      }

      function clearComposer() {
        promptEl.value = "";
        attachments.splice(0, attachments.length);
        fileInput.value = "";
        renderAttachments();
        autosizePrompt();
      }

      function createMessage(role) {
        emptyState.style.display = "none";

        const row = document.createElement("article");
        row.className = `message ${role}`;

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = role === "user" ? "U" : "M";

        const bubble = document.createElement("div");
        bubble.className = "bubble";

        row.append(avatar, bubble);
        messages.append(row);

        return { row, bubble };
      }

      function appendUserMessage(text, imageItems) {
        const { bubble } = createMessage("user");

        if (text) {
          const textBlock = document.createElement("div");
          textBlock.className = "text-block";
          textBlock.textContent = text;
          bubble.append(textBlock);
        }

        if (imageItems.length > 0) {
          const grid = document.createElement("div");
          grid.className = "thumbnail-grid";

          for (const item of imageItems) {
            const img = document.createElement("img");
            img.className = "message-thumb";
            img.src = item.dataUrl;
            img.alt = item.name;
            grid.append(img);
          }

          bubble.append(grid);
        }

        scrollToBottom();
      }

      function appendAssistantMessage() {
        const { bubble } = createMessage("assistant");

        const thinkingPanel = document.createElement("details");
        thinkingPanel.className = "thinking-panel";
        thinkingPanel.open = true;

        const summary = document.createElement("summary");
        summary.textContent = "Thinking";

        const thinkingText = document.createElement("div");
        thinkingText.className = "thinking-text";

        thinkingPanel.append(summary, thinkingText);

        const answerText = document.createElement("div");
        answerText.className = "assistant-text";

        const messageMeta = document.createElement("div");
        messageMeta.className = "message-meta";
        messageMeta.textContent = "Starting...";

        bubble.append(thinkingPanel, answerText, messageMeta);
        scrollToBottom();

        return { thinkingPanel, thinkingText, answerText, messageMeta };
      }

      function buildRequest(text, imageItems) {
        const parts = [];

        if (text) {
          parts.push({ type: "text", text });
        }

        for (const item of imageItems) {
          parts.push({
            type: "image",
            imageBase64: item.dataUrl,
            mimeType: item.mimeType,
          });
        }

        const requestContext = {
          callerService: "browser-test",
          requestedAt: new Date().toISOString(),
        };
        const priority = priorityEl.value.trim();

        if (priority) {
          requestContext.priority = Number(priority);
        }

        return {
          requestContext: {
            ...requestContext,
          },
          input: { parts },
          options: {
            responseFormat: formatEl.value,
            thinking: thinkingEl.checked,
            ollama: {
              temperature: Number(temperatureEl.value || 0.2),
            },
          },
        };
      }

      function setRunning(value) {
        sendButton.disabled = value;
        attachButton.disabled = value;
        fileInput.disabled = value;
        stopButton.classList.toggle("visible", value);
      }

      function connectStream(payload, assistantParts) {
        const protocol = location.protocol === "https:" ? "wss:" : "ws:";
        const socket = new WebSocket(`${protocol}//${location.host}/v2/infer/stream`);
        activeSocket = socket;

        socket.addEventListener("open", () => {
          socket.send(JSON.stringify(payload));
        });

        socket.addEventListener("message", (event) => {
          const message = JSON.parse(event.data);

          if (message.type === "accepted") {
            assistantParts.messageMeta.textContent = "Accepted";
            return;
          }

          if (message.type === "queued") {
            const estimate = message.data?.estimatedStartAt
              ? ` | estimated start ${new Date(message.data.estimatedStartAt).toLocaleTimeString()}`
              : "";
            const ahead =
              message.data?.requestsAhead !== undefined
                ? ` | requests ahead ${message.data.requestsAhead}`
                : "";
            assistantParts.messageMeta.textContent = `Queued: position ${message.data?.position ?? "?"}${ahead}${estimate}`;
            setStatus(`Queued: position ${message.data?.position ?? "?"}${ahead}${estimate}`, "");
            return;
          }

          if (message.type === "started") {
            assistantParts.messageMeta.textContent = "Running...";
            setStatus("Streaming response...", "ok");
            return;
          }

          if (message.type === "thinking") {
            assistantParts.thinkingPanel.classList.add("visible");
            assistantParts.thinkingText.textContent += message.data?.text || "";
            assistantParts.thinkingText.scrollTop = assistantParts.thinkingText.scrollHeight;
            scrollToBottom();
            return;
          }

          if (message.type === "chunk") {
            assistantParts.answerText.textContent += message.data?.text || "";
            scrollToBottom();
            return;
          }

          if (message.type === "done") {
            const finish = message.data?.finishReason || "stop";
            assistantParts.messageMeta.textContent = `finish: ${finish} | request: ${message.meta?.requestId || ""}`;
            setStatus("Ready", "ok");
            refreshStatus();
            return;
          }

          if (message.type === "error") {
            assistantParts.messageMeta.textContent = message.error?.message || "Inference failed.";
            assistantParts.messageMeta.classList.add("error");
            setStatus(message.error?.message || "Inference failed.", "error");
          }
        });

        socket.addEventListener("error", () => {
          assistantParts.messageMeta.textContent = "WebSocket connection failed.";
          assistantParts.messageMeta.classList.add("error");
          setStatus("WebSocket connection failed.", "error");
        });

        socket.addEventListener("close", () => {
          if (activeSocket === socket) {
            activeSocket = null;
            activeAssistant = null;
            setRunning(false);
          }
        });
      }

      function sendPrompt() {
        const text = promptEl.value.trim();
        const imageItems = attachments.slice();

        if (!text && imageItems.length === 0) {
          return;
        }

        if (activeSocket) {
          return;
        }

        appendUserMessage(text, imageItems);
        const assistantParts = appendAssistantMessage();
        activeAssistant = assistantParts;

        const payload = {
          type: "infer",
          correlationId: correlationId("browser-stream"),
          request: buildRequest(text, imageItems),
        };

        clearComposer();
        setRunning(true);
        setStatus("Connecting...", "");
        connectStream(payload, assistantParts);
      }

      async function refreshStatus() {
        try {
          const response = await fetch("/v2/model/status", {
            headers: { "x-correlation-id": correlationId("browser-status") },
          });
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.error?.message || "Status request failed");

          const data = payload.data || {};
          const runtime = data.runtime || {};
          const capacity = data.capacity || {};
          const modelId = data.modelId || "model";
          const ready = data.ready && data.loaded;
          const queue = capacity.queueDepth ? ` | queue ${capacity.queueDepth}` : "";
          const active = capacity.activeRequests ? ` | running ${capacity.activeRequests}` : "";
          const thinking = runtime.thinkingEnabled ? "default thinking on" : "default thinking off";

          if (!thinkingTouched) {
            thinkingEl.checked = Boolean(runtime.thinkingEnabled);
          }
          setStatus(
            `${modelId}: ${ready ? "ready" : "not ready"} | ${thinking}${active}${queue}`,
            ready ? "ok" : "error",
          );
        } catch (error) {
          setStatus(error.message || "Status unavailable", "error");
        }
      }

      attachButton.addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", () => {
        void addImageFiles(fileInput.files);
        fileInput.value = "";
      });
      thinkingEl.addEventListener("change", () => {
        thinkingTouched = true;
      });
      promptEl.addEventListener("input", autosizePrompt);
      sendButton.addEventListener("click", sendPrompt);
      clearButton.addEventListener("click", () => {
        if (activeSocket) return;
        clearComposer();
        messages.querySelectorAll(".message").forEach((node) => node.remove());
        emptyState.style.display = "grid";
      });
      stopButton.addEventListener("click", () => {
        if (activeSocket) {
          activeSocket.close(1000, "stopped");
          if (activeAssistant) {
            activeAssistant.messageMeta.textContent = "Stopped.";
            activeAssistant.messageMeta.classList.add("error");
          }
          setStatus("Stopped.", "");
        }
      });

      promptEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendPrompt();
        }
      });

      document.addEventListener("paste", (event) => {
        const files = [];
        for (const item of event.clipboardData?.items || []) {
          if (item.type.startsWith("image/")) {
            const file = item.getAsFile();
            if (file) files.push(file);
          }
        }
        if (files.length > 0) {
          event.preventDefault();
          void addImageFiles(files);
        }
      });

      composer.addEventListener("dragover", (event) => {
        event.preventDefault();
        composer.classList.add("dragging");
      });

      composer.addEventListener("dragleave", () => {
        composer.classList.remove("dragging");
      });

      composer.addEventListener("drop", (event) => {
        event.preventDefault();
        composer.classList.remove("dragging");
        void addImageFiles(event.dataTransfer?.files);
      });

      autosizePrompt();
      refreshStatus();
    </script>
  </body>
</html>
